<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAM LAMBERT | OFFICIAL SITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOP ANNOUNCEMENT BAR -->
    <div class="top-bar">
        <p>SIGN UP FOR THE OFFICIAL NEWSLETTER <a href="#newsletter">HERE</a></p>
    </div>

    <!-- LOGO SECTION -->
    <header class="main-header">
        <h1>ADAM LAMBERT</h1>
    </header>

    <!-- THE TILE GRID (EXACT LAYOUT) -->
    <main class="grid-container">
        
        <!-- LARGE FEATURE TILE (Latest Release) -->
        <div class="tile tile-large" style="background-image: url('release-bg.jpg');">
            <div class="tile-content">
                <h2>HIGH DRAMA</h2>
                <p>THE NEW ALBUM OUT NOW</p>
                <a href="#" class="btn">LISTEN / BUY</a>
            </div>
        </div>

        <!-- TOUR TILE -->
        <div class="tile tile-medium" style="background-image: url('tour-bg.jpg');">
            <div class="tile-content">
                <h2>TOUR</h2>
                <a href="#" class="btn">VIEW DATES</a>
            </div>
        </div>

        <!-- STORE TILE -->
        <div class="tile tile-medium" style="background-image: url('store-bg.jpg');">
            <div class="tile-content">
                <h2>STORE</h2>
                <a href="#" class="btn">SHOP NOW</a>
            </div>
        </div>

        <!-- VIDEO TILE -->
        <div class="tile tile-small" style="background-image: url('video-bg.jpg');">
            <div class="tile-content">
                <h2>VIDEO</h2>
                <a href="#" class="btn">WATCH</a>
            </div>
        </div>

        <!-- SIGN UP TILE -->
        <div id="newsletter" class="tile tile-small signup-tile">
            <div class="tile-content">
                <h2>JOIN</h2>
                <form class="signup-form">
                    <input type="email" placeholder="EMAIL ADDRESS">
                    <button type="submit">GO</button>
                </form>
            </div>
        </div>

    </main>

    <!-- STICKY FOOTER SOCIALS -->
    <footer class="sticky-footer">
        <div class="socials">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-spotify"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 ADAM LAMBERT. ALL RIGHTS RESERVED. <a href="#">PRIVACY POLICY</a></p>
        </div>
    </footer>

</body>
</html>
