<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name | Official Site</title>
    
    <!-- Fonts: Adam uses high-end Sans-Serif and Serif fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;700&family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@300;400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Transparent Sticky Nav -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="social-icons">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-x-twitter"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="logo">YOUR NAME</div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Section 1: Hero (Full Page) -->
    <section class="hero-section" id="home">
        <div class="hero-overlay">
            <h2 class="album-title">NEW SINGLE</h2>
            <h1 class="main-title">OUT NOW</h1>
            <a href="#" class="btn-outline">STREAM / PURCHASE</a>
        </div>
    </section>

    <!-- Section 2: Newsletter (The 'Join' block) -->
    <section class="newsletter-section">
        <div class="container">
            <h3>SIGN UP FOR UPDATES</h3>
            <form class="signup-form">
                <input type="email" placeholder="EMAIL ADDRESS" required>
                <button type="submit">JOIN</button>
            </form>
        </div>
    </section>

    <!-- Section 3: Music (Spotify) -->
    <section class="music-section" id="music">
        <div class="container">
            <h2 class="section-label">MUSIC</h2>
            <iframe src="https://open.spotify.com/embed/album/3O977S6YmZrqp9vj909ofp" width="100%" height="400" frameBorder="0" allowtransparency="true" allow="encrypted-media"></iframe>
        </div>
    </section>

    <!-- Section 4: Tour (Bandsintown Style) -->
    <section class="tour-section" id="tour">
        <div class="container">
            <h2 class="section-label">TOUR</h2>
            <div class="tour-list">
                <!-- Row 1 -->
                <div class="tour-row">
                    <div class="t-date">OCT 15</div>
                    <div class="t-venue">LONDON, UK — O2 ARENA</div>
                    <div class="t-btn"><a href="#">TICKETS</a></div>
                </div>
                <!-- Row 2 -->
                <div class="tour-row">
                    <div class="t-date">OCT 18</div>
                    <div class="t-venue">BERLIN, DE — MERCEDES-BENZ ARENA</div>
                    <div class="t-btn"><a href="#">TICKETS</a></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-logo">YOUR NAME</div>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Use</a>
            <a href="#">Contact</a>
        </div>
        <p class="copyright">&copy; 2023 YOUR NAME. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
