<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name '98</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Desktop Icons -->
    <div class="desktop">
        <div class="icon-group">
            <div class="icon">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" alt="Docs">
                <span>My Documents</span>
            </div>
            <div class="icon">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_open_cabinet_filled-4.png" alt="Books">
                <span>Bookshelf</span>
            </div>
            <div class="icon">
                <img src="https://win98icons.alexmeub.com/icons/png/world-4.png" alt="Social">
                <span>LinkedIn</span>
            </div>
        </div>

        <!-- The Main Window (Personal Folder) -->
        <div class="window">
            <div class="title-bar">
                <div class="title-bar-text">File Explorer - Personal</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close"></button>
                </div>
            </div>
            
            <div class="window-menu">
                <span><u>F</u>ile</span>
                <span><u>E</u>dit</span>
                <span><u>V</u>iew</span>
                <span><u>H</u>elp</span>
            </div>

            <div class="address-bar">
                <span>Address</span>
                <div class="address-input">C:\WINDOWS\DESKTOP\PERSONAL</div>
            </div>

            <div class="window-body">
                <div class="sidebar">
                    <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" width="50">
                    <h2>Personal</h2>
                    <p>Personal Folder. <br> Created: 12/11/25</p>
                    <div class="divider-line"></div>
                </div>
                <div class="folder-content">
                    <div class="file">
                        <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
                        <span>Adam Only</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <button class="start-button">
            <img src="https://win98icons.alexmeub.com/icons/png/windows_slanted-1.png" width="16">
            Start
        </button>
        <div class="taskbar-divider"></div>
        <div class="active-task">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" width="16">
            File Explorer
        </div>
        <div class="spacer"></div>
        <div class="tray">
            <img src="https://win98icons.alexmeub.com/icons/png/loudspeaker_rays-0.png" width="16">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
